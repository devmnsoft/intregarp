name: Pilot validation

on:
  workflow_dispatch:
  pull_request:
    branches: [ main, work ]

jobs:
  pilot-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Test
        run: dotnet test --no-build

      - name: Validate SQL schema usage
        run: |
          if rg -n '(^|[^a-zA-Z0-9_])(public|integra)\.' database; then
            echo "Forbidden schema reference found. Use integrarp only."
            exit 1
          fi
          rg -n 'integrarp\.' database/migrations

      - name: Validate required docs
        run: |
          test -f docs/homologation-plan.md
          test -f docs/homologation-test-cases.md
          test -f docs/training-plan.md
          test -f docs/demo-executive-script.md
          test -f docs/demo-operational-script.md
          test -f docs/demo-technical-script.md
          test -f docs/release-notes-v1.0.md
          test -f docs/go-live-plan.md
          test -f docs/rollback-plan.md
          test -f docs/runbook-pilot-operations.md
          test -f docs/pilot-acceptance-checklist.md

      - name: Validate required scripts
        run: |
          test -f scripts/validate-pilot-windows.ps1
          test -f scripts/validate-pilot-windows.cmd
          test -f scripts/run-pilot-api-windows.ps1
          test -f scripts/run-pilot-web-windows.ps1
          test -f scripts/run-pilot-worker-windows.ps1
          test -f scripts/validate-pilot-docker.ps1
          test -f scripts/reset-pilot-docker.ps1


  publish-artifacts-v115:
    name: Publish v1.15 audit artifacts
    if: always()
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Collect logs
        if: always()
        shell: bash
        run: |
          mkdir -p artifacts/v115
          find . -type f \( -name '*.log' -o -name '*.trx' -o -name 'coverage*.xml' -o -name '*.sql' \) -not -path './.git/*' -print > artifacts/v115/artifact-index.txt
          cp database/scriptcompleto.sql artifacts/v115/scriptcompleto.sql 2>/dev/null || true
          cp -r TestResults artifacts/v115/TestResults 2>/dev/null || true
      - name: Upload v1.15 audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v115-audit-${{ github.workflow }}
          path: artifacts/v115
          retention-days: 30
