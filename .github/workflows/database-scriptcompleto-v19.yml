name: database-scriptcompleto-v19
on: [push, pull_request]
jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '8.0.x' }
      - name: Validate scriptcompleto twice
        run: pwsh ./scripts/db-debug-scriptcompleto.ps1 -ConnectionString 'postgresql://postgres:postgres@localhost:5432/postgres'


  publish-artifacts-v115:
    name: Publish v1.15 audit artifacts
    if: always()
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Collect logs
        if: always()
        shell: bash
        run: |
          mkdir -p artifacts/v115
          find . -type f \( -name '*.log' -o -name '*.trx' -o -name 'coverage*.xml' -o -name '*.sql' \) -not -path './.git/*' -print > artifacts/v115/artifact-index.txt
          cp database/scriptcompleto.sql artifacts/v115/scriptcompleto.sql 2>/dev/null || true
          cp -r TestResults artifacts/v115/TestResults 2>/dev/null || true
      - name: Upload v1.15 audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v115-audit-${{ github.workflow }}
          path: artifacts/v115
          retention-days: 30
