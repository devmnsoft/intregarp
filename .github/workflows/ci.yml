name: IntegraRP CI

on:
  push:
    branches: [ main, work, feature/** ]
  pull_request:
    branches: [ main, work ]

jobs:
  build-test:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Format check
        run: dotnet format IntegraRP.sln --verify-no-changes

      - name: Build
        run: dotnet build --no-restore

      - name: Test
        run: dotnet test --no-build

      - name: Validate SQL schemas
        shell: bash
        run: |
          if rg -n '(^|[^a-zA-Z0-9_])(public|integra)\.' database; then
            echo "Scripts must not reference public. or integra. schemas"
            exit 1
          fi
          rg -n 'integrarp\.' database/migrations

      - name: Setup Node
        if: ${{ hashFiles('apps/IntegraRP.Mobile/package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/IntegraRP.Mobile/package-lock.json

      - name: Mobile install
        if: ${{ hashFiles('apps/IntegraRP.Mobile/package.json') != '' }}
        working-directory: apps/IntegraRP.Mobile
        run: npm ci

      - name: Mobile typecheck
        if: ${{ hashFiles('apps/IntegraRP.Mobile/package.json') != '' }}
        working-directory: apps/IntegraRP.Mobile
        run: npm run typecheck

      - name: Docker compose config
        run: docker compose config

      - name: Docker compose build
        run: docker compose build

      - name: Build summary
        if: always()
        shell: bash
        run: |
          echo "## IntegraRP CI" >> "$GITHUB_STEP_SUMMARY"
          echo "- OS: ${{ matrix.os }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Restore, build, test, SQL schema check and mobile typecheck configured." >> "$GITHUB_STEP_SUMMARY"


  publish-artifacts-v115:
    name: Publish v1.15 audit artifacts
    if: always()
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Collect logs
        if: always()
        shell: bash
        run: |
          mkdir -p artifacts/v115
          find . -type f \( -name '*.log' -o -name '*.trx' -o -name 'coverage*.xml' -o -name '*.sql' \) -not -path './.git/*' -print > artifacts/v115/artifact-index.txt
          cp database/scriptcompleto.sql artifacts/v115/scriptcompleto.sql 2>/dev/null || true
          cp -r TestResults artifacts/v115/TestResults 2>/dev/null || true
      - name: Upload v1.15 audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v115-audit-${{ github.workflow }}
          path: artifacts/v115
          retention-days: 30
