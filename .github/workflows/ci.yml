name: IntegraRP CI v1.18

on:
  push:
    branches: [ main, work, codex/**, feature/** ]
  pull_request:
    branches: [ main, work ]

jobs:
  dotnet-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: 8.0.x }
      - run: dotnet restore IntegraRP.sln
      - run: dotnet format IntegraRP.sln --verify-no-changes --no-restore
      - run: dotnet build IntegraRP.sln --configuration Release --no-restore
      - run: dotnet test IntegraRP.sln --configuration Release --no-build --logger "trx;LogFileName=dotnet-linux.trx" --collect:"XPlat Code Coverage"
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: v118-dotnet-linux, path: "**/TestResults/**" }

  dotnet-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: 8.0.x }
      - run: dotnet restore IntegraRP.sln
      - run: dotnet build IntegraRP.sln --configuration Release --no-restore
      - run: dotnet test IntegraRP.sln --configuration Release --no-build --logger "trx;LogFileName=dotnet-windows.trx"
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: v118-dotnet-windows, path: "**/TestResults/**" }

  postgres-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env: { POSTGRES_USER: integrarp, POSTGRES_PASSWORD: integrarp, POSTGRES_DB: integrarp_ci }
        ports: [ "5432:5432" ]
        options: >-
          --health-cmd "pg_isready -U integrarp -d integrarp_ci" --health-interval 10s --health-timeout 5s --health-retries 10
    env:
      ConnectionStrings__Postgres: Host=localhost;Port=5432;Database=integrarp_ci;Username=integrarp;Password=integrarp
      INTEGRARP_JWT_SECRET: ci-secret-ci-secret-ci-secret-ci-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: 8.0.x }
      - run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - run: psql "$ConnectionStrings__Postgres" -v ON_ERROR_STOP=1 -f database/scriptcompleto.sql
      - run: psql "$ConnectionStrings__Postgres" -v ON_ERROR_STOP=1 -f database/scriptcompleto.sql
      - run: dotnet test IntegraRP.sln --configuration Release --logger "trx;LogFileName=postgres-integration.trx" --filter "Category=Integration|FullyQualifiedName~Integration"
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: v118-postgres-integration, path: "**/TestResults/**" }

  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm, cache-dependency-path: apps/IntegraRP.Mobile/package-lock.json }
      - working-directory: apps/IntegraRP.Mobile
        run: npm ci
      - working-directory: apps/IntegraRP.Mobile
        run: npm run typecheck
      - working-directory: apps/IntegraRP.Mobile
        run: npm test --if-present
      - working-directory: apps/IntegraRP.Mobile
        run: npm audit --audit-level=high

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config
      - run: docker compose build
      - run: docker compose up -d
      - run: bash -c 'for i in {1..30}; do curl -fsS http://localhost:7001/health && exit 0 || sleep 5; done; docker compose logs; exit 1'
      - if: always()
        run: docker compose logs > docker-compose-v118.log && docker compose down -v
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: v118-docker-logs, path: docker-compose-v118.log }

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash -c "! rg -n '(password|token|secret)\s*=\s*[^\s]+' --glob '!**/package-lock.json' --glob '!artifacts/**' ."
      - run: rg -n 'Swagger|Cors|UseHttpsRedirection|AddAuthentication|AddAuthorization' src .github || true

  publish-artifacts-v118:
    runs-on: ubuntu-latest
    needs: [dotnet-linux, dotnet-windows, postgres-integration, mobile, docker, security]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p artifacts/v118
          find . -type f \( -name '*.log' -o -name '*.trx' -o -name 'coverage*.xml' -o -name '*.sql' \) -not -path './.git/*' -print > artifacts/v118/artifact-index.txt
          cp database/scriptcompleto.sql artifacts/v118/scriptcompleto.sql
      - uses: actions/upload-artifact@v4
        with: { name: v118-audit-${{ github.workflow }}, path: artifacts/v118, retention-days: 30 }
