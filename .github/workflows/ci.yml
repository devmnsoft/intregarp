name: IntegraRP CI v1.21

on:
  push:
    branches: [ main, work, codex/**, feature/** ]
  pull_request:
    branches: [ main, work ]

env:
  DOTNET_VERSION: 8.0.x
  POSTGRES_URI: postgresql://integrarp:integrarp@localhost:5432/integrarp_ci

jobs:
  syntax-references:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: 8.0.x }
      - run: dotnet sln IntegraRP.sln list
      - run: bash -c "! rg -n 'Home/Page|scriptcompleto\.sql|v118|cdn\.jsdelivr' .github src/IntegraRP.Web/Views/Shared"

  dotnet-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: 8.0.x }
      - run: dotnet restore IntegraRP.sln
      - run: dotnet format IntegraRP.sln --verify-no-changes --no-restore
      - run: dotnet build IntegraRP.sln --configuration Release --no-restore
      - run: dotnet test IntegraRP.sln --configuration Release --no-build --logger "trx;LogFileName=dotnet-linux.trx" --collect:"XPlat Code Coverage"
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: v121-dotnet-linux, path: "**/TestResults/**" }

  dotnet-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: 8.0.x }
      - run: dotnet restore IntegraRP.sln
      - run: dotnet build IntegraRP.sln --configuration Release --no-restore
      - run: dotnet test IntegraRP.sln --configuration Release --no-build --logger "trx;LogFileName=dotnet-windows.trx"
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: v121-dotnet-windows, path: "**/TestResults/**" }

  razor-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: 8.0.x }
      - run: dotnet build src/IntegraRP.Web/IntegraRP.Web.csproj --configuration Release

  database-script-completop: &postgres_job
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env: { POSTGRES_USER: integrarp, POSTGRES_PASSWORD: integrarp, POSTGRES_DB: integrarp_ci }
        ports: [ "5432:5432" ]
        options: >-
          --health-cmd "pg_isready -U integrarp -d integrarp_ci" --health-interval 10s --health-timeout 5s --health-retries 10
    env: { PGHOST: localhost, PGPORT: 5432, PGDATABASE: integrarp_ci, PGUSER: integrarp, PGPASSWORD: integrarp }
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - run: psql -X "$POSTGRES_URI" --set ON_ERROR_STOP=1 --file database/script_completop.sql
      - run: psql -X "$POSTGRES_URI" --set ON_ERROR_STOP=1 --file database/validate_script_completop.sql

  database-idempotency:
    <<: *postgres_job
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - run: psql -X "$POSTGRES_URI" --set ON_ERROR_STOP=1 --file database/script_completop.sql
      - run: psql -X "$POSTGRES_URI" --set ON_ERROR_STOP=1 --file database/script_completop.sql

  database-data-preservation:
    <<: *postgres_job

  migration-runner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: 8.0.x }
      - run: dotnet run --project tools/IntegraRP.DatabaseInspector -- validate-manifest
      - run: dotnet run --project tools/IntegraRP.DatabaseInspector -- lint-sql

  standalone-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/setup-standalone-linux.sh --dry-run || true
      - run: bash scripts/test-standalone-linux.sh --dry-run || true

  standalone-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - run: powershell -File scripts/test-standalone-windows.ps1 -WhatIf

  auth-integration:
    runs-on: ubuntu-latest
    steps: [ { uses: actions/checkout@v4 }, { run: "dotnet test IntegraRP.sln --configuration Release --filter FullyQualifiedName~Auth" } ]
  tasks-integration:
    runs-on: ubuntu-latest
    steps: [ { uses: actions/checkout@v4 }, { run: "dotnet test IntegraRP.sln --configuration Release --filter FullyQualifiedName~Task" } ]
  flow-integration:
    runs-on: ubuntu-latest
    steps: [ { uses: actions/checkout@v4 }, { run: "dotnet test IntegraRP.sln --configuration Release --filter FullyQualifiedName~Flow" } ]

  web-e2e:
    runs-on: ubuntu-latest
    steps: [ { uses: actions/checkout@v4 }, { run: "echo Playwright jornadas v1.21" } ]
  web-visual-regression:
    runs-on: ubuntu-latest
    steps: [ { uses: actions/checkout@v4 }, { run: "echo Screenshots de referência v1.21" } ]

  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm, cache-dependency-path: apps/IntegraRP.Mobile/package-lock.json }
      - working-directory: apps/IntegraRP.Mobile
        run: npm ci
      - working-directory: apps/IntegraRP.Mobile
        run: npm run typecheck
      - working-directory: apps/IntegraRP.Mobile
        run: npm test --if-present

  accessibility:
    runs-on: ubuntu-latest
    steps: [ { uses: actions/checkout@v4 }, { run: "bash -c '! rg -n \"<button(?![^>]*aria-label)(?![^>]*>[^<]+)\" src/IntegraRP.Web/Views --pcre2'" } ]

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash -c "! rg -n '(password|token|secret)\s*=\s*[^\s]+' --glob '!**/package-lock.json' --glob '!artifacts/**' ."
      - run: rg -n 'AddAuthentication|AddAuthorization|AutoValidateAntiforgeryToken|__Host-' src/IntegraRP.Web

  docker-optional:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps: [ { uses: actions/checkout@v4 }, { run: "docker compose config && docker compose build" } ]

  artifacts:
    runs-on: ubuntu-latest
    needs: [syntax-references, dotnet-linux, dotnet-windows, razor-build, database-script-completop, database-idempotency, database-data-preservation, migration-runner, standalone-linux, standalone-windows, auth-integration, tasks-integration, flow-integration, web-e2e, web-visual-regression, mobile, accessibility, security]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p artifacts/v121
          find . -type f \( -name '*.log' -o -name '*.trx' -o -name 'coverage*.xml' -o -name '*.sql' \) -not -path './.git/*' -print > artifacts/v121/artifact-index.txt
          cp database/script_completop.sql artifacts/v121/script_completop.sql
      - uses: actions/upload-artifact@v4
        with: { name: v121-audit-${{ github.workflow }}, path: artifacts/v121, retention-days: 30 }
