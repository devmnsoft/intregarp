services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: integrarp
      POSTGRES_USER: integrarp
      POSTGRES_PASSWORD: integrarp_dev
    ports: ["5432:5432"]
    volumes: ["integrarp_pg:/var/lib/postgresql/data"]
  pgadmin:
    image: dpage/pgadmin4:8
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@integrarp.local
      PGADMIN_DEFAULT_PASSWORD: integrarp_dev
    ports: ["8081:80"]
volumes: { integrarp_pg: {} }
