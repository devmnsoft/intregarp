services:
  postgres:
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-integrarp} -d $${POSTGRES_DB:-integrarp}"]
      interval: 10s
      timeout: 5s
      retries: 10

  integrarp-api:
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      IntegraRP__RunMigrations: "true"
      ConnectionStrings__IntegraRP: Host=postgres;Port=5432;Database=${POSTGRES_DB:-integrarp};Username=${POSTGRES_USER:-integrarp};Password=${POSTGRES_PASSWORD:-integrarp_dev}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy

  integrarp-web:
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      IntegraRP__ApiBaseUrl: http://integrarp-api:8080
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    depends_on:
      integrarp-api:
        condition: service_healthy

  integrarp-worker:
    environment:
      DOTNET_ENVIRONMENT: Docker
      ConnectionStrings__IntegraRP: Host=postgres;Port=5432;Database=${POSTGRES_DB:-integrarp};Username=${POSTGRES_USER:-integrarp};Password=${POSTGRES_PASSWORD:-integrarp_dev}
    depends_on:
      postgres:
        condition: service_healthy
